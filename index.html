<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shady Pro Shop</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
nav{background:#111;color:#fff;padding:15px;display:flex;justify-content:space-between}
nav h2{color:#ffcc00}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.card img{width:100%;height:220px;object-fit:cover}
.card h3,.card p{margin:10px}
.btn{background:#111;color:#fff;border:none;padding:10px;margin:10px;cursor:pointer;width:90%}
.btn:hover{background:#ffcc00;color:#000}

.cart{position:fixed;bottom:20px;right:20px;background:#ffcc00;padding:15px;border-radius:50%;cursor:pointer}
.whatsapp{position:fixed;bottom:20px;left:20px;background:#25D366;color:#fff;padding:15px;border-radius:50%}

#admin{display:none;padding:20px;background:#fff;margin:20px;border-radius:10px}

input{padding:10px;margin:5px;width:90%}
</style>
</head>

<body>

<nav>
<h2>Shady Shop 🔥</h2>
<div onclick="login()">Admin</div>
</nav>

<div id="admin">
<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">
<button class="btn" onclick="addProduct()">Add</button>
</div>

<div class="products" id="products"></div>

<div class="cart" onclick="checkout()">🛒 <span id="count">0</span></div>

<a class="whatsapp" id="whatsapp" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Hoodie",price:150,img:"https://i.imgur.com/Hg4zrGx.jpeg"},
{name:"T-Shirt",price:80,img:"https://i.imgur.com/Gw5uYKE.jpeg"}
];

let cart=[];

function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} EGP</p>
<button class="btn" onclick="add(${i})">Add to Cart</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
cart.push(products[i]);
document.getElementById("count").innerText=cart.length;
}

function checkout(){
if(cart.length==0){alert("Cart empty");return;}
let msg="Order:%0A";
cart.forEach(p=>{
msg+=`${p.name} - ${p.price} EGP%0A`;
});
window.open(`https://wa.me/20123456789?text=${msg}`);
}

function login(){
let pass=prompt("Enter password");
if(pass==="1234"){
document.getElementById("admin").style.display="block";
}else{
alert("Wrong password");
}
}

function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let img=document.getElementById("img").value;

products.push({name,price,img});
localStorage.setItem("products",JSON.stringify(products));
render();
alert("Added ✅");
}

render();
</script>

</body>
</html>
